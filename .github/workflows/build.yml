name: Build RLS VPN Client

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rls-vpn-client/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rls-vpn-client/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache SoftEther installer
        id: cache-se
        uses: actions/cache@v4
        with:
          path: se_client.exe
          key: softether-vpnclient-v4.42-9798

      - name: Download SoftEther installer
        if: steps.cache-se.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $url = "https://github.com/SoftEtherVPN/SoftEtherVPN_Stable/releases/download/v4.42-9798-rtm/softether-vpnclient-v4.42-9798-rtm-2023.06.30-windows-x86_x64-intel.exe"
          Write-Host "A descarregar SoftEther VPN Client..."
          Invoke-WebRequest -Uri $url -OutFile "se_client.exe" -UseBasicParsing
          Write-Host "Download concluido: $((Get-Item se_client.exe).Length) bytes"

      - name: Copiar installer para resources da app
        shell: powershell
        run: |
          # O instalador do SoftEther vai bundled na app e é instalado silenciosamente na 1ª execução
          Copy-Item "se_client.exe" "rls-vpn-client\src-tauri\se_client.exe"
          Write-Host "Installer copiado para resources: $((Get-Item 'rls-vpn-client\src-tauri\se_client.exe').Length) bytes"

      - name: Install frontend dependencies
        working-directory: rls-vpn-client
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: rls-vpn-client
          tagName: v__VERSION__
          releaseName: "RLS Automacao VPN v__VERSION__"
          releaseBody: |
            ## RLS Automacao VPN Client

            ### Instalacao (um so passo)
            1. Descarrega o ficheiro `.msi` abaixo
            2. Instala com duplo clique (pode pedir permissao de administrador)
            3. Abre a app **RLS Automacao VPN**
            4. Na primeira execucao instala automaticamente os componentes necessarios
            5. Clica **Ligar**

            ### Requisitos
            - Windows 10/11 (64-bit)
            - Ligacao ao ZeroTier (rede b9a18a606f6713e2)
          releaseDraft: false
          prerelease: false
