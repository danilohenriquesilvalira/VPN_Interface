name: Build RLS VPN Client

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install SoftEther VPN Client (para extrair vpncmd.exe)
        shell: powershell
        run: |
          $url = "https://github.com/SoftEtherVPN/SoftEtherVPN_Stable/releases/download/v4.42-9798-rtm/softether-vpnclient-v4.42-9798-rtm-2023.06.30-windows-x86_x64-intel.exe"
          Invoke-WebRequest -Uri $url -OutFile "se_client.exe"
          Start-Process -FilePath "se_client.exe" -ArgumentList "/SILENT" -Wait
          $vpncmd = "C:\Program Files\SoftEther VPN Client\vpncmd.exe"
          if (Test-Path $vpncmd) {
            Copy-Item $vpncmd -Destination "rls-vpn-client\src-tauri\vpncmd.exe"
            echo "vpncmd.exe copiado com sucesso"
          } else {
            echo "AVISO: vpncmd.exe nao encontrado, o utilizador precisa instalar SoftEther Client"
          }

      - name: Install frontend dependencies
        working-directory: rls-vpn-client
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: rls-vpn-client
          tagName: v__VERSION__
          releaseName: "RLS Automacao VPN v__VERSION__"
          releaseBody: |
            ## RLS Automacao VPN Client

            ### Instalacao (simples)
            1. Descarrega o ficheiro `.msi` abaixo
            2. Instala (duplo clique)
            3. Abre a app RLS Automacao VPN
            4. Clica **Ligar**

            ### Requisitos
            - Windows 10/11 (64-bit)
            - Estar ligado ao ZeroTier (rede b9a18a606f6713e2)
          releaseDraft: false
          prerelease: false
